permissions:
  contents: write

name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      build_runner:
        description: 'Build backup-runner'
        type: boolean
        default: false
      build_app:
        description: 'Build app'
        type: boolean
        default: false
      build_cli:
        description: 'Build CLI'
        type: boolean
        default: false

jobs:
  build-runner:
    if: github.event.inputs.build_runner == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          file: Dockerfile.backup-runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            timegroups/tango-backup-runner:latest
      - name: Show image size
        run: |
          echo "=== Image Size ==="
          docker manifest inspect timegroups/tango-backup-runner:latest -v | \
            grep -E '"size"|"platform"' || \
            echo "Use Docker Hub to check compressed size"
          echo ""
          echo "Check: https://hub.docker.com/r/timegroups/tango-backup-runner/tags"

  build-app:
    if: >
      github.event_name == 'push' ||
      github.event.inputs.build_app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            timegroups/tango-cloud:${{ steps.version.outputs.tag }}
            timegroups/tango-cloud:latest
      - name: Show image size
        run: |
          echo "=== Image Size ==="
          docker manifest inspect timegroups/tango-cloud:${{ steps.version.outputs.tag }} -v | \
            grep -E '"size"|"platform"' || \
            echo "Use Docker Hub to check compressed size"
          echo ""
          echo "Check: https://hub.docker.com/r/timegroups/tango-cloud/tags"

  build-cli:
    if: >
      github.event_name == 'release' ||
      github.event.inputs.build_cli == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: windows
            arch: arm64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Resolve CLI version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Build CLI
        run: |
          mkdir -p dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
            -ldflags="-X main.version=${{ steps.version.outputs.tag }} -X main.commit=${{ github.sha }}" \
            -o dist/tango-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
            ./cmd/cli
      - uses: actions/upload-artifact@v4
        with:
          name: tango-cli-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/tango-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  publish-cli:
    if: >
      github.event_name == 'release' ||
      github.event.inputs.build_cli == 'true'
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tango-cli-*
          merge-multiple: true
          path: dist
      - name: Publish CLI release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || 'cli-latest' }}
          make_latest: ${{ github.event_name != 'workflow_dispatch' }}
          files: |
            dist/tango-linux-amd64
            dist/tango-linux-arm64
            dist/tango-darwin-amd64
            dist/tango-darwin-arm64
            dist/tango-windows-amd64.exe
            dist/tango-windows-arm64.exe
