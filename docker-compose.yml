services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@db:5432/tango?sslmode=disable
      - JWT_SECRET=mysecretkey123
      - BUILDKIT_HOST=tcp://buildkitd:1234
      - BUILD_WORKSPACE_DIR=/workspace/jobs
      # Registry credentials (optional — set to push to a registry)
      # - BUILD_REGISTRY_HOST=ghcr.io
      # - BUILD_REGISTRY_USER=your-username
      # - BUILD_REGISTRY_PASS=your-token
    volumes:
      - workspace:/workspace/jobs
    depends_on:
      db:
        condition: service_healthy
      buildkitd:
        condition: service_started

  buildkitd:
    image: moby/buildkit:latest
    privileged: true
    ports:
      - "1234:1234"
    command:
      - --addr
      - tcp://0.0.0.0:1234
    volumes:
      - buildkit-cache:/var/lib/buildkit
      - workspace:/workspace/jobs

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tango
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

volumes:
  pgdata:
  buildkit-cache:
  workspace:
