services:
  backup-runner:
    image: ${BACKUP_RUNNER_IMAGE:-timegroups/tango-backup-runner:latest}
    restart: unless-stopped
    ports:
      - "8081:8081"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8081/healthz",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      BACKUP_RUNNER_PORT: "8081"
      BACKUP_RUNNER_TOKEN: "${BACKUP_RUNNER_TOKEN:-}"
      MYSQL_INSTALL_DIR: "/usr/local"
      MARIADB_INSTALL_DIR: "/usr/local/mariadb"
    networks:
      - tango_net
      - internal

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/traefik/traefik.yml"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/ping",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
      - "./traefik:/traefik"
    networks:
      - tango_net

  app:
    image: ${APP_IMAGE:-timegroups/tango-cloud:latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      PORT: "8080"
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
      BUILDKIT_HOST: "tcp://buildkitd:1234"
      BUILD_WORKSPACE_DIR: "/workspace/jobs"
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY}"
      DOCKER_HOST: "unix:///var/run/docker.sock"
      BACKUP_RUNNER_BASE_URL: "http://backup-runner:8081"
      BACKUP_RUNNER_TOKEN: "${BACKUP_RUNNER_TOKEN:-}"
      TRAEFIK_CONFIG_DIR: "/traefik/config"
      APP_DOMAIN: "${APP_DOMAIN:-}"
      APP_TLS_ENABLED: "${APP_TLS_ENABLED:-false}"
      APP_BACKEND_URL: "http://app:8080"
      RESOURCE_MOUNT_ROOT: "${RESOURCE_MOUNT_ROOT:-/tmp/tango-resource-volumes}"
      RESOURCE_MOUNT_ROOT_APP: "${RESOURCE_MOUNT_ROOT_APP:-/platform/resource-volumes}"
    volumes:
      - workspace:/workspace/jobs
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik:/traefik
      - ${RESOURCE_MOUNT_ROOT:-/tmp/tango-resource-volumes}:${RESOURCE_MOUNT_ROOT_APP:-/platform/resource-volumes}
    depends_on:
      backup-runner:
        condition: service_healthy
      db:
        condition: service_healthy
      buildkitd:
        condition: service_healthy
    networks:
      - tango_net
      - internal

  buildkitd:
    image: moby/buildkit:latest
    restart: unless-stopped
    privileged: true
    healthcheck:
      test:
        [
          "CMD",
          "buildctl",
          "--addr",
          "tcp://localhost:1234",
          "debug",
          "workers",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command:
      - --addr
      - tcp://0.0.0.0:1234
    volumes:
      - buildkit-cache:/var/lib/buildkit
      - workspace:/workspace/jobs
    networks:
      - internal

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tango
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tango"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  pgdata:
  buildkit-cache:
  workspace:

networks:
  tango_net:
    name: tango_net
    external: true
  internal:
