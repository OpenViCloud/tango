services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Optional Let's Encrypt — only activated when TRAEFIK_ACME_EMAIL is set
      - "${TRAEFIK_ACME_EMAIL:+--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}}"
      - "${TRAEFIK_ACME_EMAIL:+--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json}"
      - "${TRAEFIK_ACME_EMAIL:+--certificatesresolvers.letsencrypt.acme.httpchallenge=true}"
      - "${TRAEFIK_ACME_EMAIL:+--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - tango_net

  app:
    image: ttl.sh/tango-cloud:24h
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/tango?sslmode=disable"
      JWT_SECRET: "mysecretkey123"
      BUILDKIT_HOST: "tcp://buildkitd:1234"
      BUILD_WORKSPACE_DIR: "/workspace/jobs"
      LLM_CONFIG_ENCRYPTION_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      BASE_URL: "http://test.openrepo.cloud"
      FRONTEND_BASE_URL: "http://test.openrepo.cloud"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - workspace:/workspace/jobs
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true
      - traefik.docker.network=tango_net
      - traefik.http.routers.tango.rule=Host(`test.openrepo.cloud`)
      - traefik.http.routers.tango.entrypoints=web
      - traefik.http.services.tango.loadbalancer.server.port=8080
    depends_on:
      db:
        condition: service_healthy
      buildkitd:
        condition: service_started
    networks:
      - tango_net
      - internal

  buildkitd:
    image: moby/buildkit:latest
    restart: unless-stopped
    privileged: true
    command:
      - --addr
      - tcp://0.0.0.0:1234
    volumes:
      - buildkit-cache:/var/lib/buildkit
      - workspace:/workspace/jobs
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tango
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tango"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  pgdata:
  buildkit-cache:
  workspace:

networks:
  tango_net:
    name: tango_net
  internal:
