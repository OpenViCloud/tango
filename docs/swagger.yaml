      - BearerAuth: []
      summary: Update agent
      tags:
      - agents
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns an access token. A refresh token
        is set in an httpOnly cookie.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
