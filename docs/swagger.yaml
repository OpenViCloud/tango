basePath: /api
definitions:
  internal_auth.ChangePasswordRequest:
    properties:
      current_password:
        minLength: 6
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  internal_auth.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  internal_auth.MessageResponse:
    properties:
      message:
        type: string
    type: object
  internal_auth.TokenResponse:
    properties:
      access_token:
        type: string
    type: object
  internal_handler_rest.apiKeyResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      user_id:
        type: string
    type: object
  internal_handler_rest.assignUserRoleRequest:
    properties:
      role_id:
        type: string
    type: object
  internal_handler_rest.buildJobListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_handler_rest.buildJobResponse'
        type: array
      page_index:
        type: integer
      page_size:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  internal_handler_rest.buildJobResponse:
    properties:
      archive_name:
        type: string
      build_mode:
        type: string
      created_at:
        type: string
      error_msg:
        type: string
      finished_at:
        type: string
      git_branch:
        type: string
      git_url:
        type: string
      id:
        type: string
      image_tag:
        type: string
      logs:
        type: string
      source_type:
        type: string
      started_at:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  internal_handler_rest.channelListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_handler_rest.channelOperationResponse'
        type: array
      pageIndex:
        type: integer
      pageSize:
        type: integer
      totalItems:
        type: integer
      totalPage:
        type: integer
    type: object
  internal_handler_rest.channelOperationResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      kind:
        type: string
      name:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  internal_handler_rest.channelQRCodeResponse:
    properties:
      id:
        type: string
      qr_code:
        type: string
    type: object
  internal_handler_rest.channelTestConnectionResponse:
    properties:
      details:
        additionalProperties: {}
        type: object
      kind:
        type: string
      message:
        type: string
      ok:
        type: boolean
    type: object
  internal_handler_rest.checkRepoResponse:
    properties:
      available:
        type: boolean
      branch_exists:
        type: boolean
      default_branch:
        type: string
      error:
        type: string
    type: object
  internal_handler_rest.containerPortResponse:
    properties:
      ip:
        type: string
      private_port:
        type: integer
      public_port:
        type: integer
      type:
        type: string
    type: object
  internal_handler_rest.containerResponse:
    properties:
      command:
        type: string
      id:
        type: string
      image:
        type: string
      image_id:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
      ports:
        items:
          $ref: '#/definitions/internal_handler_rest.containerPortResponse'
        type: array
      short_id:
        type: string
      state:
        type: string
      status:
        type: string
    type: object
  internal_handler_rest.createAPIKeyRequest:
    properties:
      expires_at:
        description: RFC3339, omit for no expiry
        type: string
      name:
        type: string
    required:
    - name
    type: object
  internal_handler_rest.createAPIKeyResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      key:
        description: shown once only
        type: string
      last_used_at:
        type: string
      name:
        type: string
      user_id:
        type: string
    type: object
  internal_handler_rest.createBuildRequest:
    properties:
      build_mode:
        description: '"auto" | "dockerfile"'
        type: string
      git_branch:
        type: string
      git_url:
        type: string
      image_tag:
        type: string
    required:
    - git_url
    - image_tag
    type: object
  internal_handler_rest.createChannelRequest:
    properties:
      credentials:
        items:
          type: integer
        type: array
      kind:
        type: string
      name:
        type: string
      settings:
        items:
          type: integer
        type: array
    type: object
  internal_handler_rest.createContainerRequest:
    properties:
      auto_remove:
        type: boolean
      cmd:
        items:
          type: string
        type: array
      env:
        additionalProperties:
          type: string
        type: object
      image:
        type: string
      name:
        type: string
      port_bindings:
        additionalProperties:
          type: string
        description: containerPort -> hostPort, e.g. "80" -> "8080"
        type: object
      volumes:
        description: bind mounts, e.g. "/host:/container"
        items:
          type: string
        type: array
    type: object
  internal_handler_rest.createRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  internal_handler_rest.createUserRequest:
    properties:
      address:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      nickname:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
  internal_handler_rest.discordRuntimeRequest:
    properties:
      allowed_user_ids:
        items:
          type: string
        type: array
      enable_message_content_intent:
        type: boolean
      enable_typing:
        type: boolean
      require_mention:
        type: boolean
      token:
        type: string
    type: object
  internal_handler_rest.discordRuntimeResponse:
    properties:
      allowed_user_ids:
        items:
          type: string
        type: array
      channel:
        type: string
      enable_message_content_intent:
        type: boolean
      enable_typing:
        type: boolean
      require_mention:
        type: boolean
      running:
        type: boolean
      token_configured:
        type: boolean
    type: object
  internal_handler_rest.errorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handler_rest.imageResponse:
    properties:
      created:
        type: string
      digest:
        type: string
      id:
        type: string
      in_use:
        type: integer
      short_id:
        type: string
      size:
        type: string
      size_bytes:
        type: integer
      tags:
        items:
          type: string
        type: array
    type: object
  internal_handler_rest.logEntryResponse:
    properties:
      client_ip:
        type: string
      fields:
        additionalProperties:
          type: string
        type: object
      level:
        type: string
      message:
        type: string
      method:
        type: string
      path:
        type: string
      query:
        type: string
      raw:
        type: string
      status:
        type: integer
      time:
        type: string
      trace_id:
        type: string
    type: object
  internal_handler_rest.pullImageRequest:
    properties:
      reference:
        type: string
    type: object
  internal_handler_rest.roleListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_handler_rest.roleResponse'
        type: array
      pageIndex:
        type: integer
      pageSize:
        type: integer
      totalItems:
        type: integer
      totalPage:
        type: integer
    type: object
  internal_handler_rest.roleResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_system:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
    type: object
  internal_handler_rest.swaggerGenericRequest:
    properties:
      name:
        type: string
    type: object
  internal_handler_rest.tailLogsResponse:
    properties:
      file_path:
        type: string
      items:
        items:
          $ref: '#/definitions/internal_handler_rest.logEntryResponse'
        type: array
      lines:
        items:
          type: string
        type: array
    type: object
  internal_handler_rest.testChannelConnectionRequestDoc:
    properties:
      credentials:
        additionalProperties: {}
        type: object
      kind:
        type: string
      settings:
        additionalProperties: {}
        type: object
    type: object
  internal_handler_rest.updateChannelRequest:
    properties:
      credentials:
        items:
          type: integer
        type: array
      kind:
        type: string
      name:
        type: string
      replace_credentials:
        type: boolean
      settings:
        items:
          type: integer
        type: array
      status:
        type: string
    type: object
  internal_handler_rest.updateRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  internal_handler_rest.updateUserRequest:
    properties:
      address:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      nickname:
        type: string
      phone:
        type: string
    type: object
  internal_handler_rest.userResponse:
    properties:
      address:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      nickname:
        type: string
      phone:
        type: string
      status:
        type: string
    type: object
  internal_handler_rest.userRoleResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_system:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: REST API for Tango authentication, users, and streaming endpoints.
  title: Tango API
  version: 0.1.0
paths:
  /api-keys:
    get:
      description: Lists all API keys belonging to the authenticated user. Key values
        are not returned.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler_rest.apiKeyResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      description: Creates a new API key for the authenticated user. The key is shown
        once and cannot be retrieved again.
      parameters:
      - description: API key options
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.createAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler_rest.createAPIKeyResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create API key
      tags:
      - api-keys
  /api-keys/{id}:
    delete:
      description: Permanently deletes an API key. Only the owner can revoke their
        own keys.
      parameters:
      - description: API key ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Revoke API key
      tags:
      - api-keys
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Changes the current user's password and clears auth cookies so
        they must log in again.
      parameters:
      - description: Password change payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns an access token. A refresh token
        is set in an httpOnly cookie.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Clears auth cookies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.MessageResponse'
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      description: Exchanges the refresh token cookie for a new access token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /backup-configs:
    post:
      parameters:
      - description: Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.swaggerGenericRequest'
      responses: {}
      security:
      - BearerAuth: []
      summary: POST /backup-configs
      tags:
      - backup-configs
  /backup-configs/{id}:
    get:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: GET /backup-configs/{id}
      tags:
      - backup-configs
    put:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      - description: Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.swaggerGenericRequest'
      responses: {}
      security:
      - BearerAuth: []
      summary: PUT /backup-configs/{id}
      tags:
      - backup-configs
  /backup-sources:
    get:
      responses: {}
      security:
      - BearerAuth: []
      summary: GET /backup-sources
      tags:
      - backup-sources
    post:
      parameters:
      - description: Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.swaggerGenericRequest'
      responses: {}
      security:
      - BearerAuth: []
      summary: POST /backup-sources
      tags:
      - backup-sources
  /backup-sources/{id}:
    delete:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: DELETE /backup-sources/{id}
      tags:
      - backup-sources
    get:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: GET /backup-sources/{id}
      tags:
      - backup-sources
    put:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      - description: Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.swaggerGenericRequest'
      responses: {}
      security:
      - BearerAuth: []
      summary: PUT /backup-sources/{id}
      tags:
      - backup-sources
  /backup-sources/{id}/backup-config:
    get:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: GET /backup-sources/{id}/backup-config
      tags:
      - backup-sources
  /backup-sources/{id}/backups:
    get:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: GET /backup-sources/{id}/backups
      tags:
      - backup-sources
    post:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      - description: Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.swaggerGenericRequest'
      responses: {}
      security:
      - BearerAuth: []
      summary: POST /backup-sources/{id}/backups
      tags:
      - backup-sources
  /backups/{id}:
    get:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      responses: {}
      security:
      - BearerAuth: []
      summary: GET /backups/{id}
      tags:
      - backups
  /backups/{id}/restore:
    post:
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      - description: Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.swaggerGenericRequest'
      responses: {}
      security:
      - BearerAuth: []
      summary: POST /backups/{id}/restore
      tags:
      - backups
  /builds:
    get:
      parameters:
      - description: Page index (0-based)
        in: query
        name: pageIndex
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_rest.buildJobListResponse'
      security:
      - BearerAuth: []
      summary: List build jobs
      tags:
      - builds
    post:
      consumes:
      - application/json
      parameters:
      - description: Build request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.createBuildRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_handler_rest.buildJobResponse'
      security:
      - BearerAuth: []
      summary: Submit a new build job from a Git URL
      tags:
      - builds
  /builds/{id}:
    get:
      parameters:
      - description: Build job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_rest.buildJobResponse'
      security:
      - BearerAuth: []
      summary: Get a build job by ID
      tags:
      - builds
  /builds/{id}/cancel:
    post:
      parameters:
      - description: Build job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_rest.buildJobResponse'
      security:
      - BearerAuth: []
      summary: Cancel a running build job
      tags:
      - builds
  /builds/check-repo:
    get:
      parameters:
      - description: Git repository URL
        in: query
        name: url
        required: true
        type: string
      - description: Branch to verify (optional)
        in: query
        name: branch
        type: string
      - description: Access token for private repos (optional)
        in: query
        name: token
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_rest.checkRepoResponse'
      security:
      - BearerAuth: []
      summary: Check if a git repository is accessible and optionally verify a branch
      tags:
      - builds
  /builds/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Source archive (.tar.gz, .tgz, or .zip)
        in: formData
        name: archive
        required: true
        type: file
      - description: Image tag to push
        in: formData
        name: image_tag
        required: true
        type: string
      - description: 'Build mode: auto (default) or dockerfile'
        in: formData
        name: build_mode
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_handler_rest.buildJobResponse'
      security:
      - BearerAuth: []
      summary: Submit a new build job from an uploaded archive (.tar.gz or .zip)
      tags:
      - builds
  /channels:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_rest.channelListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler_rest.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler_rest.errorResponse'
      security:
      - BearerAuth: []
      summary: List channels
      tags:
      - channels
    post:
      consumes:
      - application/json
      parameters:
      - description: Channel payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_rest.createChannelRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler_rest.channelOperationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler_rest.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler_rest.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler_rest.errorResponse'
      security:
      - BearerAuth: []
      summary: Create channel
      tags:
      - channels
  /channels/{id}:
    delete:
      parameters:
      - description: Channel ID
