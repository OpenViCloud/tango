info:
  contact: {}
  description: REST API for Tango authentication, users, and streaming endpoints.
  title: Tango API
  version: 0.1.0
paths:
  /agents:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.agentListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.errorResponse'
      security:
      - BearerAuth: []
      summary: List agents
      tags:
      - agents
    post:
      consumes:
      - application/json
      parameters:
      - description: Agent payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.createAgentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/rest.agentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.errorResponse'
      security:
      - BearerAuth: []
      summary: Create agent
      tags:
      - agents
  /agents/{id}:
    delete:
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete agent
      tags:
      - agents
    get:
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
